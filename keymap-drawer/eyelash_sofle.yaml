layout: {zmk_keyboard: eyelash_sofle}
layers:
  en:
  - $$mdi:keyboard-esc$$
  - {t: '1', s: '!'}
  - {t: '2', s: '@'}
  - {t: '3', s: '#'}
  - {t: '4', s: $}
  - {t: '5', s: '%'}
  - $$mdi:brightness-5$$
  - {t: '6', s: ^}
  - {t: '7', s: '&'}
  - {t: '8', s: '*'}
  - {t: '9', s: (}
  - {t: '0', s: )}
  - {t: '$$mdi:backspace$$', type: backspace}
  - $$mdi:keyboard-tab$$
  - Q
  - W
  - E
  - R
  - T
  - $$mdi:brightness-7$$
  - Y
  - U
  - I
  - O
  - P
  - {t: '$$mdi:minus-circle-outline$$', type: none}
  - {t: '$$mdi:minus-circle-outline$$', type: none}
  - A
  - S
  - D
  - F
  - G
  - {t: '$$mdi:minus-circle-outline$$', type: none}
  - H
  - J
  - K
  - L
  - {t: ;, s: ':'}
  - {t: '''', s: '"'}
  - {t: '$$mdi:minus-circle-outline$$', type: none}
  - Z
  - X
  - C
  - V
  - B
  - {t: '$$mdi:minus-circle-outline$$', type: none}
  - N
  - M
  - {t: ',', s: <}
  - {t: ., s: '>'}
  - {t: /, s: '?'}
  - {t: '$$mdi:minus-circle-outline$$', type: none}
  - $$mdi:volume-off$$
  - {t: '$$mdi:minus-circle-outline$$', type: none}
  - {t: '$$mdi:minus-circle-outline$$', type: none}
  - $$mdi:apple-keyboard-command$$
  - {t: '$$mdi:minus-circle-outline$$', type: none}
  - $$mdi:keyboard-space$$
  - {t: '$$mdi:minus-circle-outline$$', type: none}
  - {t: '$$mdi:keyboard-return$$', type: enter}
  - {t: '$$mdi:minus-circle-outline$$', type: none}
  - RIGHT GUI
  - {t: '$$mdi:minus-circle-outline$$', type: none}
  - {t: '$$mdi:minus-circle-outline$$', type: none}
combos:
- p: [30, 29]
  k: $$mdi:apple-keyboard-control$$
- p: [34, 35]
  k: $$mdi:apple-keyboard-control$$
- p: [30, 28]
  k: $$mdi:apple-keyboard-shift$$
- p: [34, 36]
  k: $$mdi:apple-keyboard-shift$$
- p: [30, 27]
  k: $$mdi:apple-keyboard-option$$
- p: [34, 37]
  k: $$mdi:apple-keyboard-option$$
